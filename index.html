<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f4e9c" />
  <title>Albert Corporation CRM</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css?v=8" />
</head>
<body>

  <main id="pantalla-login" class="pantalla-login">
    <div class="tarjeta-login">
      <h1 class="marca">Albert Corporation</h1>
      <p class="subtitulo">CRM interno</p>

      <form id="login-form" autocomplete="on">
        <label for="login-email">Correo</label>
        <input
          id="login-email"
          type="email"
          required
          autocomplete="username"
          placeholder="tu@correo.com"
        />

        <label for="login-password">Contraseña</label>
        <input
          id="login-password"
          type="password"
          required
          autocomplete="current-password"
          placeholder="Tu contraseña"
        />

        <button id="login-button" type="submit" class="boton-principal">
          Entrar
        </button>

        <p id="login-error" class="mensaje-error" role="alert"></p>
      </form>
    </div>
  </main>

  <div id="pantalla-app" class="pantalla-app oculto">
    <header class="cabecera">
      <div class="cabecera-marca">Albert Corporation CRM</div>
      <div class="cabecera-derecha">
        <span id="usuario-nombre" class="usuario-nombre"></span>
        <button id="logout-button" class="boton-secundario">Salir</button>
      </div>
    </header>

    <nav class="nav-secciones">
      <button class="nav-boton activa" data-seccion="clientes">Clientes</button>
      <button class="nav-boton" data-seccion="equipos">Equipos</button>
    </nav>

    <section class="contenido">
      <div id="seccion-clientes" class="seccion activa">
        <div class="barra-acciones">
          <h2 class="titulo-seccion">Clientes <span id="contador-clientes" class="contador"></span></h2>
          <button id="btn-nuevo-cliente" class="boton-principal compacto">
            + Nuevo cliente
          </button>
        </div>

        <div class="barra-filtros">
          <input
            id="buscador-clientes"
            type="search"
            class="buscador"
            placeholder="Buscar por nombre, telefono o notas..."
            autocomplete="off"
          />
          <select id="filtro-ciudad" class="filtro-select">
            <option value="">Todas las ciudades</option>
            <option value="Navojoa">Navojoa</option>
            <option value="Huatabampo">Huatabampo</option>
            <option value="Etchojoa">Etchojoa</option>
            <option value="Hermosillo">Hermosillo</option>
            <option value="Otro">Otro</option>
          </select>
          <select id="filtro-tipo" class="filtro-select">
            <option value="">Todos los tipos</option>
            <option value="residencial">Residencial</option>
            <option value="comercial">Comercial</option>
          </select>
        </div>

        <div id="lista-clientes" class="lista-clientes" aria-live="polite">
          <p class="mensaje-vacio">Cargando clientes...</p>
        </div>
      </div>

      <div id="seccion-equipos" class="seccion">
        <div class="barra-acciones">
          <h2 class="titulo-seccion">Equipos <span id="contador-equipos" class="contador"></span></h2>
          <button id="btn-nuevo-equipo" class="boton-principal compacto">
            + Nuevo equipo
          </button>
        </div>

        <div class="barra-filtros">
          <input
            id="buscador-equipos"
            type="search"
            class="buscador"
            placeholder="Buscar por cliente, modelo o notas..."
            autocomplete="off"
          />
          <select id="filtro-equipo-tipo" class="filtro-select">
            <option value="">Todos los tipos</option>
            <option value="planta-purificadora">Planta purificadora</option>
            <option value="equipo-domestico">Equipo doméstico</option>
            <option value="alberca-equipo">Equipo de alberca</option>
          </select>
        </div>

        <div id="lista-equipos" class="lista-clientes" aria-live="polite">
          <p class="mensaje-vacio">Cargando equipos...</p>
        </div>
      </div>
    </section>
  </div>

  <div id="modal-form-cliente" class="modal oculto" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-form">
    <div class="modal-fondo" data-cerrar></div>
    <div class="modal-tarjeta">
      <header class="modal-cabecera">
        <h2 id="titulo-modal-form">Nuevo cliente</h2>
        <button class="modal-cerrar" data-cerrar aria-label="Cerrar">&times;</button>
      </header>

      <form id="form-cliente" class="form-cliente" data-modo="nuevo">
        <div class="campo">
          <label>Tipo de cliente *</label>
          <div class="grupo-radio">
            <label class="opcion-radio">
              <input type="radio" name="tipo" value="residencial" checked />
              <span>Residencial</span>
            </label>
            <label class="opcion-radio">
              <input type="radio" name="tipo" value="comercial" />
              <span>Comercial</span>
            </label>
          </div>
        </div>

        <div class="campo">
          <label for="nuevo-nombre">Nombre o razón social *</label>
          <input id="nuevo-nombre" name="nombre" type="text" required maxlength="120" />
        </div>

        <div class="campo">
          <label for="nuevo-telefono">Teléfono *</label>
          <input id="nuevo-telefono" name="telefono" type="tel" required maxlength="20" placeholder="6421234567" />
        </div>

        <div class="campo">
          <label for="nuevo-ciudad">Ciudad / zona *</label>
          <select id="nuevo-ciudad" name="ciudad" required>
            <option value="Navojoa">Navojoa</option>
            <option value="Huatabampo">Huatabampo</option>
            <option value="Etchojoa">Etchojoa</option>
            <option value="Hermosillo">Hermosillo</option>
            <option value="Otro">Otro</option>
          </select>
        </div>

        <div class="campo">
          <label for="nuevo-notas">Notas (opcional)</label>
          <textarea id="nuevo-notas" name="notas" maxlength="500" rows="3" placeholder="Cualquier dato adicional..."></textarea>
        </div>

        <p id="error-form-cliente" class="mensaje-error" role="alert"></p>

        <div class="acciones-modal">
          <button type="button" class="boton-secundario" data-cerrar>Cancelar</button>
          <button type="submit" id="btn-guardar-cliente" class="boton-principal">Guardar cliente</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-detalle-cliente" class="modal oculto" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-detalle">
    <div class="modal-fondo" data-cerrar></div>
    <div class="modal-tarjeta">
      <header class="modal-cabecera">
        <h2 id="titulo-modal-detalle">Detalle del cliente</h2>
        <button class="modal-cerrar" data-cerrar aria-label="Cerrar">&times;</button>
      </header>

      <div id="contenido-detalle-cliente" class="detalle-cliente"></div>

      <div class="acciones-modal acciones-detalle">
        <button type="button" id="btn-eliminar-cliente" class="boton-peligro">Eliminar</button>
        <button type="button" id="btn-editar-cliente" class="boton-secundario">Editar</button>
        <button type="button" class="boton-principal" data-cerrar>Cerrar</button>
      </div>
    </div>
  </div>

  <div id="modal-form-equipo" class="modal oculto" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-form-equipo">
    <div class="modal-fondo" data-cerrar></div>
    <div class="modal-tarjeta">
      <header class="modal-cabecera">
        <h2 id="titulo-modal-form-equipo">Nuevo equipo</h2>
        <button class="modal-cerrar" data-cerrar aria-label="Cerrar">&times;</button>
      </header>

      <form id="form-equipo" class="form-cliente" data-modo="nuevo">
        <div class="campo">
          <label for="equipo-cliente">Cliente *</label>
          <select id="equipo-cliente" name="clienteId" required>
            <option value="">Selecciona un cliente...</option>
          </select>
        </div>

        <div class="campo">
          <label for="equipo-tipo">Tipo de equipo *</label>
          <select id="equipo-tipo" name="tipo" required>
            <option value="planta-purificadora">Planta purificadora</option>
            <option value="equipo-domestico">Equipo doméstico (suavizador, filtros)</option>
            <option value="alberca-equipo">Equipo de alberca</option>
          </select>
        </div>

        <div class="campo">
          <label for="equipo-modelo">Modelo / descripción (opcional)</label>
          <input id="equipo-modelo" name="modelo" type="text" maxlength="120" placeholder="Ej: Planta 5000 L, Suavizador 1054..." />
        </div>

        <div class="campo">
          <label for="equipo-fecha">Fecha de instalación (opcional)</label>
          <input id="equipo-fecha" name="fechaInstalacion" type="date" />
        </div>

        <div class="campo">
          <label for="equipo-notas">Notas (opcional)</label>
          <textarea id="equipo-notas" name="notas" maxlength="500" rows="3" placeholder="Componentes especiales, ubicación, garantía..."></textarea>
        </div>

        <p id="error-form-equipo" class="mensaje-error" role="alert"></p>

        <div class="acciones-modal">
          <button type="button" class="boton-secundario" data-cerrar>Cancelar</button>
          <button type="submit" id="btn-guardar-equipo" class="boton-principal">Guardar equipo</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-form-componente" class="modal oculto" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-componente">
    <div class="modal-fondo" data-cerrar></div>
    <div class="modal-tarjeta">
      <header class="modal-cabecera">
        <h2 id="titulo-modal-componente">Agregar componente</h2>
        <button class="modal-cerrar" data-cerrar aria-label="Cerrar">&times;</button>
      </header>

      <form id="form-componente" class="form-cliente">
        <div class="campo">
          <label for="comp-tipo">Componente *</label>
          <select id="comp-tipo" name="tipo" required>
            <option value="sal-pellets">Sal en pellets (suavizador)</option>
            <option value="carbon">Filtro de carbón</option>
            <option value="resina">Resina</option>
            <option value="turbidex">Turbidex</option>
            <option value="lampara-uv">Lámpara UV</option>
            <option value="preventivo">Mantenimiento preventivo general</option>
            <option value="filtro-alberca">Filtro de alberca</option>
            <option value="quimicos-alberca">Químicos de alberca</option>
            <option value="otro">Otro</option>
          </select>
        </div>

        <div class="campo">
          <label for="comp-frecuencia">Frecuencia (cada cuántos meses) *</label>
          <input id="comp-frecuencia" name="frecuenciaMeses" type="number" min="1" max="60" required />
        </div>

        <div class="campo">
          <label for="comp-ultimo">Último mantenimiento (opcional)</label>
          <input id="comp-ultimo" name="ultimoMantenimiento" type="date" />
          <p class="ayuda-campo">Si lo dejas vacío, el sistema usará la fecha de instalación del equipo o la fecha de hoy.</p>
        </div>

        <div class="campo">
          <label for="comp-notas">Notas (opcional)</label>
          <textarea id="comp-notas" name="notas" maxlength="200" rows="2"></textarea>
        </div>

        <p id="error-form-componente" class="mensaje-error" role="alert"></p>

        <div class="acciones-modal">
          <button type="button" class="boton-secundario" data-cerrar>Cancelar</button>
          <button type="submit" id="btn-guardar-componente" class="boton-principal">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-detalle-equipo" class="modal oculto" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-detalle-equipo">
    <div class="modal-fondo" data-cerrar></div>
    <div class="modal-tarjeta">
      <header class="modal-cabecera">
        <h2 id="titulo-modal-detalle-equipo">Detalle del equipo</h2>
        <button class="modal-cerrar" data-cerrar aria-label="Cerrar">&times;</button>
      </header>

      <div id="contenido-detalle-equipo" class="detalle-cliente"></div>

      <div class="acciones-modal acciones-detalle">
        <button type="button" id="btn-eliminar-equipo" class="boton-peligro">Eliminar</button>
        <button type="button" id="btn-editar-equipo" class="boton-secundario">Editar</button>
        <button type="button" class="boton-principal" data-cerrar>Cerrar</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js?v=8"></script>
</body>
</html>
