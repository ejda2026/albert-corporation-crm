<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b6cff" />
  <title>Albert Corporation CRM</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main id="pantalla-login" class="pantalla-login">
    <div class="tarjeta-login">
      <h1 class="marca">Albert Corporation</h1>
      <p class="subtitulo">CRM interno</p>

      <form id="login-form" autocomplete="on">
        <label for="login-email">Correo</label>
        <input
          id="login-email"
          type="email"
          required
          autocomplete="username"
          placeholder="tu@correo.com"
        />

        <label for="login-password">Contraseña</label>
        <input
          id="login-password"
          type="password"
          required
          autocomplete="current-password"
          placeholder="Tu contraseña"
        />

        <button id="login-button" type="submit" class="boton-principal">
          Entrar
        </button>

        <p id="login-error" class="mensaje-error" role="alert"></p>
      </form>
    </div>
  </main>

  <div id="pantalla-app" class="pantalla-app oculto">
    <header class="cabecera">
      <div class="cabecera-marca">Albert Corporation CRM</div>
      <div class="cabecera-derecha">
        <span id="usuario-nombre" class="usuario-nombre"></span>
        <button id="logout-button" class="boton-secundario">Salir</button>
      </div>
    </header>

    <section class="contenido">
      <div class="bienvenida">
        <h2>Bienvenido</h2>
        <p>El CRM está listo. Los módulos (clientes, equipos, mantenimientos) se irán activando en los próximos pasos.</p>
      </div>
    </section>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
